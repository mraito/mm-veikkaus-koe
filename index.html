<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, Fragment } = React;

/* ===================== TALLENNUSVAHVISTUS (TOAST) ===================== */
let toastListeners=[];
function toast(text,kind){ toastListeners.forEach(fn=>fn(text,kind)); }
function Toast(){
  const [items,setItems]=useState([]);
  useEffect(()=>{
    const fn=(text,kind)=>{ const id=Date.now()+"_"+Math.random();
      setItems(a=>[...a,{id,text,kind:kind||""}]);
      setTimeout(()=>setItems(a=>a.filter(x=>x.id!==id)),2200);
    };
    toastListeners.push(fn);
    return ()=>{ toastListeners=toastListeners.filter(f=>f!==fn); };
  },[]);
  if(items.length===0) return null;
  return <div className="toastwrap">{items.map(t=><div key={t.id} className={"toast"+(t.kind==="err"?" err":"")}>{t.text}</div>)}</div>;
}

function buildSeedMatches(){ return FIXTURES.map(m=>({...m})); }
function todayISO(){ const d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); }
const WD=["su","ma","ti","ke","to","pe","la"];
function dateLabel(ds,ts){ const d=new Date(ds+"T12:00:00"),t=new Date(ts+"T12:00:00"); const diff=Math.round((d-t)/86400000);
  if(diff===0)return"tänään"; if(diff===1)return"huomenna"; if(diff===-1)return"eilen"; if(diff===2)return"ylihuomenna";
  return WD[d.getDay()]+" "+d.getDate()+"."+(d.getMonth()+1)+"."; }

/* ===================== PISTEYTYS ===================== */
const sign=x=>x>0?1:x<0?-1:0;
function matchPoints(pred,m){
  if(!pred||pred.h===""||pred.a===""||pred.h==null||pred.a==null) return null;
  if(m.hg===""||m.ag===""||m.hg==null||m.ag==null) return null;
  const ph=+pred.h,pa=+pred.a,ah=+m.hg,aa=+m.ag; let base=0;
  if(sign(ph-pa)===sign(ah-aa)){ const hits=(ph===ah?1:0)+(pa===aa?1:0); base=hits===2?5:hits===1?4:3; }
  return m.dbl?base*2:base;
}
const pkey=(name,country)=>`${(name||"").trim()}__${country||""}`;
const signp=(n)=> `${n}`;
function playerPts(pos,tally){ if(!tally) return 0; const k=POS[pos];
  return (+tally.cs||0)*k.cs+(+tally.goal||0)*k.goal+(+tally.assist||0)*k.assist+(+tally.red||0)*k.red+(+tally.og||0)*k.og; }
function autoGroupWins(team,matches){ let n=0; (matches||[]).forEach(mt=>{
  if(mt.hg===""||mt.hg==null||mt.ag===""||mt.ag==null) return; const hg=+mt.hg,ag=+mt.ag;
  if(mt.home===team&&hg>ag) n++; else if(mt.away===team&&ag>hg) n++; }); return n; }
function teamTotalWins(team,matches,teamstats){ const t=(teamstats&&teamstats[team])||{}; return autoGroupWins(team,matches)+(+t.wins||0); }
function teamPoints(team,matches,teamstats){ const t=(teamstats&&teamstats[team])||{};
  return teamTotalWins(team,matches,teamstats)*WIN_POINTS+(t.champ?CHAMP_POINTS:0); }

function Countdown(){
  const target=useMemo(()=>{ const d=FIXTURES.reduce((a,b)=>a.date<b.date?a:b).date; return new Date(d+"T00:00:00").getTime(); },[]);
  const [now,setNow]=useState(Date.now());
  useEffect(()=>{ const t=setInterval(()=>setNow(Date.now()),1000); return ()=>clearInterval(t); },[]);
  const diff=target-now;
  if(diff<=0) return <div className="countdown"><div className="cdbox"><div className="cdnum">⚽</div><div className="cdlab">Käynnissä</div></div></div>;
  const s=Math.floor(diff/1000), d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60), ss=s%60;
  const pad=n=>String(n).padStart(2,"0");
  return (<div className="countdown">
    <div className="cdbox"><div className="cdnum">{d}</div><div className="cdlab">päivää</div></div>
    <div className="cdbox"><div className="cdnum">{pad(h)}</div><div className="cdlab">tuntia</div></div>
    <div className="cdbox"><div className="cdnum">{pad(m)}</div><div className="cdlab">min</div></div>
    <div className="cdbox"><div className="cdnum">{pad(ss)}</div><div className="cdlab">sek</div></div>
  </div>);
}

function App(){

  const [playerstats,setPlayerstats]=useState({});
  const [preds,setPreds]=useState({});
  const [err,setErr]=useState("");

  useEffect(()=>{
    if(!cfgOk) return;
    const subs=[];
    subs.push(docRef("matches").onSnapshot(d=>{
      const fromCache = d.metadata && d.metadata.fromCache;
      if(!d.exists){
        // Dokumenttia ei ole: kylvä pohja VAIN jos tieto on palvelimelta (ei välimuistin "ei tietoa" -tila).
        if(!fromCache){ const sd=buildSeedMatches(); docRef("matches").set({list:sd}).catch(e=>setErr(e.message)); setMatches(sd); }
        return;
      }
      const lst=d.data().list;
      if(Array.isArray(lst)&&lst.length&&lst[0]&&lst[0].date){ setMatches(lst); }
      // Dokumentti on olemassa mutta lista näyttää tyhjältä/rikkinäiseltä:
      // EI KOSKAAN ylikirjoiteta tietokantaa. Näytetään pohja vain muistissa jos meillä ei vielä ole mitään.
      else { setMatches(prev=>prev||buildSeedMatches()); }
    },e=>setErr(e.message)));
    subs.push(docRef("config").onSnapshot(d=>{ if(d.exists) setConfig({locked:false,pin:"",stake:10,...d.data()}); },e=>setErr(e.message)));
    subs.push(docRef("teamstats").onSnapshot(d=>{ setTeamstats(d.exists?(d.data().map||{}):{}); }));
    subs.push(docRef("playerstats").onSnapshot(d=>{ setPlayerstats(d.exists?(d.data().map||{}):{}); }));
    subs.push(db.collection("predictions").onSnapshot(s=>{ const o={}; s.forEach(x=>o[x.id]=x.data()); setPreds(o); },e=>setErr(e.message)));
    return ()=>subs.forEach(u=>u&&u());
  },[]);

  const scores=useMemo(()=>{
    const out={}; const ms=matches||[];
    Object.entries(preds).forEach(([id,p])=>{
      let mp=0; ms.forEach(mt=>{ const pt=matchPoints(p.scores&&p.scores[mt.id],mt); if(pt) mp+=pt; });
      let pp=0; POS_ORDER.forEach(pos=>{ const pk=p.picks&&p.picks[pos];
        if(pk&&pk.name) pp+=playerPts(pos,playerstats[pkey(pk.name,pk.country)]); });
      let tp=0; if(p.team){ tp=teamPoints(p.team,ms,teamstats); }
      out[id]={mp,pp,tp,total:mp+pp+tp};
    });
    return out;
  },[preds,matches,playerstats,teamstats]);

  if(!cfgOk) return <Setup/>;
  if(matches===null) return <div className="wrap" style={{paddingTop:80}}><p className="lab">Yhdistetään tietokantaan…</p>{err&&<div className="note err">Virhe: {err}</div>}</div>;

  return (
    <div className="wrap">
      <Toast/>
      <header className="hero">
        <div className="herorow">
          <img className="logo" src={WC_LOGO} alt="FIFA World Cup 2026"/>
          <div className="htxt">
            <div className="kick">USA · KANADA · MEKSIKO — 11.6.–19.7.2026</div>
            <h1 className="title">MM-<em>VEIKKAUS</em> '26</h1>
            <p className="sub">Veikkaa alkulohkon ottelut ja kokoa oma joukkueesi.</p>
          </div>
          <Countdown/>
        </div>
      </header>
      <nav className="tabs">
        {[["veikkaus","Oma veikkaus"],["karki","Tulostaulukko"],["ottelut","Ottelut"],["saannot","Säännöt"],["jarjestaja","Järjestäjä"]].map(([k,l])=>
          <button key={k} className={"tab"+(tab===k?" on":"")} onClick={()=>setTab(k)}>{l}</button>)}
      </nav>
      {err&&<div className="note err">Tietokantavirhe: {err} — tarkista Firestore-säännöt (README vaihe 4).</div>}
      {tab==="veikkaus"&&<Veikkaus matches={matches} preds={preds} config={config} playerstats={playerstats}/>}
      {tab==="karki"&&(detail&&preds[detail]
        ? <Kortti p={preds[detail]} sc={scores[detail]} matches={matches} teamstats={teamstats} playerstats={playerstats} onBack={()=>setDetail(null)}/>
        : <Fragment>
            <PotBar count={Object.keys(preds).length} played={matches.filter(m=>m.hg!==""&&m.hg!=null).length} total={matches.length} stake={config.stake||10}/>
            {config.locked&&<Live matches={matches} preds={preds} today={todayISO()}/>}
            {config.locked&&<Porssi preds={preds} playerstats={playerstats}/>}
            <Karki preds={preds} scores={scores} matches={matches} playerstats={playerstats} teamstats={teamstats} locked={config.locked} onOpen={id=>setDetail(id)} stake={config.stake||10}/>
          </Fragment>)}
      {tab==="ottelut"&&<Ottelut matches={matches} preds={preds} locked={config.locked}/>}
      {tab==="saannot"&&<Saannot stake={config.stake!=null?config.stake:10}/>}

      </p>
    </div>
  );
}

  const dup = countries.length!==new Set(countries).size;
  const setField=(pos,patch)=>{ const np={...picks,[pos]:{...(picks[pos]||{name:"",country:""}),...patch}}; onChange({...value,picks:np}); };
  return (
    <div>
      <div className="grid4">
        {POS_ORDER.map(pos=>{
          const pk=picks[pos]||{name:"",country:""};
          const squad=pk.country?(SQUADS[pk.country]||null):null;
          const hasSquad=squad&&squad.length>0;
          const known=hasSquad&&squad.some(p=>p.n===pk.name);
          const isCustom=!!custom[pos];
          const pts=(showPts&&pk.name)?playerPts(pos,playerstats[pkey(pk.name,pk.country)]):null;

                {ALL_TEAMS.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              {hasSquad
                ? <select style={{width:"100%",marginTop:6}} disabled={disabled} value={selVal}
                    onChange={e=>{const v=e.target.value;
                      if(v==="__custom__"){setCustom(s=>({...s,[pos]:true}));}
                      else if(v==="__own__"){}
                      else {setField(pos,{name:v});setCustom(s=>({...s,[pos]:false}));}}}>
                    <option value="">— pelaaja —</option>
                    <optgroup label={POS[pos].label}>
                      {squad.filter(p=>p.pos===pos).map(p=><option key={p.n} value={p.n}>{p.n}</option>)}

                    <optgroup label="Muut pelaajat">

            </div>

    </div>
  );
}

/* ===================== KÄRKITAULU ===================== */
function Cell({pos,pick,teamstats,playerstats,champ,matches}){
  const country=champ?pick:(pick&&pick.country);
  const out=country&&teamstats[country]&&teamstats[country].out;
  const label= champ?"Mestarimaa":POS[pos].label;
  let nm,pts;
  if(champ){ nm=pick||"—"; pts=pick?teamPoints(pick,matches,teamstats):0; }
  else { nm=(pick&&pick.name)||"—"; pts=(pick&&pick.name)?playerPts(pos,playerstats[pkey(pick.name,pick.country)]):0; }
  return (
    <div className={"cellbox"+(out?" out":"")}>
      <div className="nm">{country?<span className="flag">{flag(country)}</span>:null}{nm}</div>
      <div className="pts">{out?`${signp(pts)} p · tippunut`:`${signp(pts)} p`}</div>
    </div>
  );
}
function LockedCell(){
  return (
    <div className="cellbox" style={{display:"flex",alignItems:"center"}}>
      <div className="nm" style={{color:"var(--mut)",fontWeight:700}}>🔒 piilossa</div>
    </div>
  );
}
function PayPill({paid,stake,full}){
  const base={fontSize:full?13:11,fontWeight:800,padding:full?"6px 13px":"2px 9px",borderRadius:999,display:"inline-flex",alignItems:"center",gap:full?6:4,whiteSpace:"nowrap"};
  if(paid) return <span style={{...base,background:"rgba(57,229,124,.16)",color:"var(--grn)"}}>✓ Maksu{full?" suoritettu":""}</span>;
  return <span style={{...base,background:"rgba(255,207,63,.14)",color:"var(--amb)",border:"1px solid var(--amb2)"}}>⧗ Maksu kesken{full?` — ${stake} € · MobilePay 050 376 7619`:""}</span>;
}
function eur(x){ if(x==null) return ""; const r=Math.round(x*100)/100; return (r%1===0)?(r+" €"):(r.toFixed(2).replace(".",",")+" €"); }
function computePrizes(rows,pot){ const tier=[0.6,0.3,0.1]; const n=rows.length; const res=[]; let i=0;
  while(i<n){ let j=i; while(j+1<n && rows[j+1].total===rows[i].total) j++; let sum=0; for(let p=i;p<=j;p++) sum+=(tier[p]||0)*pot; const each=sum/(j-i+1); for(let k=i;k<=j;k++) res[k]={rank:i+1,prize:each}; i=j+1; } return res; }
function PotBar({count,played,total,stake}){ const pot=count*stake; const ts=[["1",pot*0.6,60,"g"],["2",pot*0.3,30,"s"],["3",pot*0.1,10,"b"]];
  return (<div className="potbar">
    <div><div className="lab">Potti</div><div className="pottot">{eur(pot)}</div></div>
    <div className="tiers">{ts.map(([r,a,p,c])=><div key={r} className="tier"><span className={"medal "+c}>{r}</span><div><div className="teur">{eur(a)}</div><div className="tiny">{p} %</div></div></div>)}</div>
  </div>); }

/* ===================== PISTEPÖRSSI (valitut pelaajat) ===================== */
function Porssi({preds,playerstats}){
  const [open,setOpen]=useState(false);
  const names=Object.keys(preds);
  const map={};
  names.forEach(id=>POS_ORDER.forEach(pos=>{ const pk=preds[id].picks&&preds[id].picks[pos];
    if(pk&&pk.name){ const kk=pkey(pk.name,pk.country)+"__"+pos;
      if(!map[kk]) map[kk]={name:pk.name,country:pk.country,pos,tally:playerstats[pkey(pk.name,pk.country)]||{},pickers:[]};
      map[kk].pickers.push(preds[id].name||id); } }));
  let arr=Object.values(map).map(v=>({...v,pts:playerPts(v.pos,v.tally)})).filter(v=>v.pts!==0);
  if(arr.length===0) return null;
  arr.sort((a,b)=>b.pts-a.pts || (a.country||"").localeCompare(b.country||"","fi") || (a.name||"").localeCompare(b.name||"","fi"));
  const show=open?arr:arr.slice(0,5); const rest=arr.length-show.length;
  const parts=(v)=>{ const k=POS[v.pos],t=v.tally,out=[];
    const g=Number(t.goal||0); if(g&&k.goal) out.push([g+" "+(g===1?"maali":"maalia"),g*k.goal]);
    const a=Number(t.assist||0); if(a&&k.assist) out.push([a+" "+(a===1?"syöttö":"syöttöä"),a*k.assist]);
    const c=Number(t.cs||0); if(c&&k.cs) out.push([c+" "+(c===1?"nollapeli":"nollapeliä"),c*k.cs]);
    const r=Number(t.red||0); if(r) out.push([r+" "+(r===1?"punainen kortti":"punaista korttia"),r*k.red]);
    const o=Number(t.og||0); if(o) out.push([o+" "+(o===1?"oma maali":"omaa maalia"),o*k.og]);
    return out; };
  return (<div className="card">
    <div className="lab" style={{color:"var(--blue2)"}}>Pistepörssi — valitut pelaajat</div>
    {show.map((v,i)=>{ const ch=parts(v); return (
      <div key={i} className="liverow">
        <div className="row between" style={{alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:9,minWidth:0}}>
            <span className={"rank"+(i===0?" gold":"")} style={{minWidth:22,textAlign:"center"}}>{i+1}</span>
            <div style={{minWidth:0}}><span style={{fontWeight:800,fontSize:15}}>{flag(v.country)} {v.name}</span> <span className="tiny" style={{textTransform:"uppercase",letterSpacing:".04em"}}>· {POS[v.pos].label}</span></div>
          </div>
          <span className="mono" style={{fontSize:18,fontWeight:700,color:v.pts<0?"var(--red)":"var(--teal)"}}>{signp(v.pts)} p</span>
        </div>
        <div className="row wrapf" style={{gap:6,marginTop:5}}>
          {ch.map((c,j)=><span key={j} style={{fontSize:12,fontWeight:700,borderRadius:8,padding:"3px 9px",background:c[1]<0?"rgba(255,93,82,.13)":"rgba(57,229,124,.12)",color:c[1]<0?"var(--red)":"var(--teal)"}}>{c[0]} · {signp(c[1])}</span>)}
        </div>
        <div className="tiny" style={{marginTop:6}}>Valinnut: {v.pickers.join(", ")}</div>
      </div>
    );})}
    {arr.length>5&&<div style={{textAlign:"center",marginTop:10}}><span className="morechip" onClick={()=>setOpen(o=>!o)}>{open?"▴ vähemmän":"+"+rest+" ▾"}</span></div>}
  </div>);
}

/* ===================== OTTELUT ===================== */
function Ottelut({matches,preds,locked}){

  const dates=useMemo(()=>[...new Set(matches.map(m=>m.date))].sort(),[matches]);

  const [openDay,setOpenDay]=useState(()=>({[defaultDay]:true}));
  const [expPred,setExpPred]=useState({});
  const dayTitle=(ds)=>{ const d=new Date(ds+"T12:00:00"); const f=WD[d.getDay()]+" "+d.getDate()+"."+(d.getMonth()+1)+"."; const rel=dateLabel(ds,today); return rel===f?f:rel+" · "+f; };
  const matchBlock=(mt)=>{
    const done=mt.hg!==""&&mt.ag!==""&&mt.hg!=null&&mt.ag!=null;
    const predList=(!done&&locked)?names.map(id=>({n:preds[id].name||id,pr:preds[id].scores&&preds[id].scores[mt.id]})).filter(x=>x.pr&&x.pr.h!==""&&x.pr.a!==""):[];
    const op=expPred[mt.id]; const showP=op?predList:predList.slice(0,3); const restP=predList.length-showP.length;
    return <div key={mt.id} style={{padding:"10px 0",borderBottom:"1px dashed var(--line)"}}>
      <div className="row between">
        <div className="tm">{flag(mt.home)} {mt.home} <span className="mut">vs</span> {flag(mt.away)} {mt.away}{mt.dbl&&<span className="pill dbl" style={{marginLeft:6}}>×2</span>}</div>
        <div className="mono" style={{fontSize:17}}>{done?`${mt.hg}–${mt.ag}`:"– : –"}</div>
      </div>
      {done&&<div className="row wrapf" style={{gap:6,marginTop:6}}>
        {names.map(id=>{ const pr=preds[id].scores&&preds[id].scores[mt.id]; const pt=matchPoints(pr,mt);
          if(!pr||pr.h===""||pr.a==="") return null;
          const base=mt.dbl?pt/2:pt; const cls=base>=5?"g":base===4?"g2":base===3?"y":"z";
          return <span key={id} className={"pill "+cls}>{preds[id].name||id} {pr.h}-{pr.a} · {pt}p</span>; })}
      </div>}
      {!done&&locked&&<div className="row wrapf" style={{gap:6,marginTop:6}}>
        {predList.length===0?<span className="tiny">ei veikkauksia</span>:showP.map((x,i)=><span key={i} className="predchip">{x.n} <span className="s">{x.pr.h}-{x.pr.a}</span></span>)}
        {predList.length>3&&<span className="morechip" onClick={()=>setExpPred(e=>({...e,[mt.id]:!op}))}>{op?"▴ vähemmän":"+"+restP+" ▾"}</span>}
      </div>}
    </div>;
  };
  return (
    <div>
      <div className="card"><div className="note">Täysosuma 5 p · lopputulos + toisen maalimäärä 4 p · pelkkä lopputulos 3 p · tuplaottelu ×2. Tarkemmat säännöt Säännöt-välilehdellä.</div>
        <div className="row" style={{gap:10,marginTop:4}}>
          <span className="tiny" style={{fontWeight:700}}>Näkymä:</span>
          <div className="seg">
            <button className={"segb"+(view==="lohko"?" on":"")} onClick={()=>setView("lohko")}>Lohkoittain</button>
            <button className={"segb"+(view==="paiva"?" on":"")} onClick={()=>setView("paiva")}>Päivittäin</button>
          </div>
        </div>
      </div>

      {view==="lohko" && Object.keys(GROUPS).map(g=>(
        <div className="card" key={g}>
          <div className="section-h" onClick={()=>setOpen(o=>({...o,[g]:!o[g]}))}><span>Lohko {g} — {GROUPS[g].join(", ")}</span><span>{open[g]?"–":"+"}</span></div>
          {open[g]&&matches.filter(m=>m.group===g).map(matchBlock)}
        </div>
      ))}

      {view==="paiva" && dates.map(ds=>{ const isToday=ds===today; const dms=matches.filter(m=>m.date===ds);
        return <div className="card" key={ds} style={isToday?{borderColor:"#3a47a8"}:null}>
          <div className="section-h" onClick={()=>setOpenDay(o=>({...o,[ds]:!o[ds]}))}>
            <span>{dayTitle(ds)}{isToday&&<span className="todaytag">TÄNÄÄN</span>}</span>
            <span>{openDay[ds]?"–":"+"}</span>
          </div>
          {openDay[ds]&&dms.map(matchBlock)}
        </div>;
      })}
    </div>
  );
}

/* ===================== JÄRJESTÄJÄ ===================== */
function Admin({matches,preds,config,teamstats,playerstats}){
  const [pin,setPin]=useState(""); const [ok,setOk]=useState(!config.pin);
  if(!ok) return (
    <div className="card"><div className="lab">Vain järjestäjälle</div>
      <h2 style={{fontSize:20,margin:"6px 0 10px"}}>Syötä PIN</h2>
      <div className="row wrapf"><input type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder="PIN"/>
      <button className="act" onClick={()=>setOk(pin===config.pin)}>Avaa</button></div>
      {pin&&pin!==config.pin&&<div className="note warn">Väärä PIN.</div>}</div>
  );
  return <AdminPanel matches={matches} preds={preds} config={config} teamstats={teamstats} playerstats={playerstats}/>;
}

function AdminPanel({matches,preds,config,teamstats,playerstats}){
  const [open,setOpen]=useState({tools:true});
  const [mDraft,setMDraft]=useState(matches);
  useEffect(()=>{setMDraft(matches);},[matches]);
  const fl=(t)=>toast(t, /virhe/i.test(t)?"err":"");
  const upM=(id,patch)=>setMDraft(ms=>ms.map(m=>m.id===id?{...m,...patch}:m));
  const saveM=async()=>{
    const filled=a=>(a||[]).filter(m=>m.hg!==""&&m.hg!=null&&m.ag!==""&&m.ag!=null).length;
    const before=filled(matches), after=filled(mDraft);
    if(before-after>=3){
      if(!window.confirm("Huom: tämä tallennus näyttää tyhjentävän "+(before-after)+" jo syötettyä tulosta. Jos et tarkoittanut tätä, peruuta ja lataa sivu uudelleen (Ctrl+F5). Tallennetaanko silti?")) return;
    }
    try{await docRef("matches").set({list:mDraft});fl("Tulokset tallennettu");}catch(e){fl("Virhe: "+e.message);}
  };

  // pelaajatilastot
  const picked=useMemo(()=>{ const map={};
    Object.values(preds).forEach(p=>POS_ORDER.forEach(pos=>{ const pk=p.picks&&p.picks[pos];
      if(pk&&pk.name){ const k=pkey(pk.name,pk.country); (map[k]=map[k]||{name:pk.name,country:pk.country,pos:new Set()}).pos.add(pos);} }));
    return Object.entries(map).map(([k,v])=>({k,...v,pos:[...v.pos]}))
      .sort((a,b)=>{ const c=(a.country||"").localeCompare(b.country||"","fi"); if(c!==0) return c;
        const pa=Math.min(...a.pos.map(p=>POS_ORDER.indexOf(p))), pb=Math.min(...b.pos.map(p=>POS_ORDER.indexOf(p)));
        if(pa!==pb) return pa-pb; return (a.name||"").localeCompare(b.name||"","fi"); }); },[preds]);
  const [psDraft,setPsDraft]=useState(playerstats);
  useEffect(()=>{setPsDraft(playerstats);},[playerstats]);
  const setStat=(k,f,v)=>{ if(!/^[0-9]{0,2}$/.test(v))return; setPsDraft(s=>({...s,[k]:{...(s[k]||{}),[f]:v}})); };
  const psFilled=map=>Object.keys(map||{}).filter(k=>Object.values(map[k]||{}).some(v=>v!==""&&v!=null&&Number(v)>0)).length;
  const savePs=async()=>{
    const before=psFilled(playerstats), after=psFilled(psDraft);
    if(before-after>=3){
      if(!window.confirm("Huom: tämä tallennus näyttää tyhjentävän "+(before-after)+" pelaajan jo syötetyt tilastot. Jos et tarkoittanut tätä, peruuta ja lataa sivu uudelleen (Ctrl+F5). Tallennetaanko silti?")) return;
    }
    try{await docRef("playerstats").set({map:psDraft});fl("Pelaajatilastot tallennettu");}catch(e){fl("Virhe: "+e.message);}
  };

  // joukkuetilastot + tippuminen
  const [tsDraft,setTsDraft]=useState(teamstats);
  useEffect(()=>{setTsDraft(teamstats);},[teamstats]);
  const setTeam=(t,f,v)=>setTsDraft(s=>({...s,[t]:{...(s[t]||{}),[f]:v}}));
  const champTeams=[...new Set(Object.values(preds).map(p=>p.team).filter(Boolean))];
  const tsFilled=map=>Object.keys(map||{}).filter(t=>{const x=map[t]||{};return (Number(x.wins)>0)||x.champ||x.out;}).length;
  const saveTs=async()=>{
    const before=tsFilled(teamstats), after=tsFilled(tsDraft);
    if(before-after>=3){
      if(!window.confirm("Huom: tämä tallennus näyttää tyhjentävän "+(before-after)+" joukkueen jo syötetyt tiedot. Jos et tarkoittanut tätä, peruuta ja lataa sivu uudelleen (Ctrl+F5). Tallennetaanko silti?")) return;
    }
    try{await docRef("teamstats").set({map:tsDraft});fl("Joukkuetiedot tallennettu");}catch(e){fl("Virhe: "+e.message);}
  };

  // muiden korjaus
  const [editId,setEditId]=useState("");
  const [editDraft,setEditDraft]=useState(null);
  const [delId,setDelId]=useState("");
  const [resetId,setResetId]=useState("");
  const setPaid=async(id,val)=>{ try{ await db.collection("predictions").doc(id).set({maksettu:val},{merge:true}); fl(val?"Merkitty maksetuksi":"Maksu poistettu"); }catch(e){ fl("Virhe: "+e.message); } };
  const startEdit=(id)=>{ setEditId(id); setEditDraft(JSON.parse(JSON.stringify({picks:{},team:"",...preds[id]}))); };
  const saveEdit=async()=>{ if(hasDupCountry(editDraft)){fl("Neljä eri maata!");return;}
    try{await db.collection("predictions").doc(editId).set(editDraft);fl("Osallistujan valinnat tallennettu");}catch(e){fl("Virhe: "+e.message);} };
  const doDelete=async()=>{ if(!delId) return; const nm=(preds[delId]&&preds[delId].name)||delId; if(!window.confirm("Poistetaanko veikkaaja \""+nm+"\" pysyvästi? Tätä ei voi perua.")) return;
    try{ await db.collection("predictions").doc(delId).delete(); setDelId(""); fl("Veikkaaja poistettu"); }catch(e){ fl("Virhe: "+e.message); } };
  const doResetPin=async()=>{ if(!resetId) return; const nm=(preds[resetId]&&preds[resetId].name)||resetId;
    if(!window.confirm("Nollataanko veikkaajan \""+nm+"\" PIN? Sen jälkeen veikkauksen voi avata ilman PIN:iä.")) return;
    try{ await db.collection("predictions").doc(resetId).set({pin:""},{merge:true}); setResetId(""); fl("PIN nollattu"); }catch(e){ fl("Virhe: "+e.message); } };

  return (
    <div>
      <div className="card">
        <div className="section-h" onClick={()=>setOpen(o=>({...o,tools:!o.tools}))}><span>Asetukset</span><span>{open.tools?"–":"+"}</span></div>
        {open.tools&&<div>
          <label className="row" style={{gap:8}}>
            <input type="checkbox" style={{width:18,height:18}} checked={!!config.locked}
              onChange={async e=>{try{await docRef("config").set({locked:e.target.checked},{merge:true});fl("Tallennettu");}catch(x){fl(x.message);}}}/>
            <span>Lukitse veikkaukset (esim. avausottelun alkaessa)</span></label>
          <div className="divider"/>
          <div className="lab">Järjestäjän PIN</div>
          <div className="row wrapf" style={{marginTop:6}}>
            <input placeholder="aseta PIN" defaultValue={config.pin}
              onBlur={async e=>{try{await docRef("config").set({pin:e.target.value},{merge:true});fl("PIN tallennettu");}catch(x){fl(x.message);}}}/>
            <span className="tiny">Kevyt suoja kaveriporukalle, ei tietoturvaa.</span></div>
          <div className="divider"/>
          <div className="lab">Panostus per osallistuja (€)</div>
          <div className="row wrapf" style={{marginTop:6}}>
            <input type="number" min="0" step="1" style={{width:120}} defaultValue={config.stake!=null?config.stake:10}
              onBlur={async e=>{try{await docRef("config").set({stake:Number(e.target.value)||0},{merge:true});fl("Panostus tallennettu");}catch(x){fl(x.message);}}}/>
            <span className="tiny">Potti & palkinnot (60/30/10 %) lasketaan tästä ja osallistujamäärästä.</span></div>
        </div>}
      </div>

      {/* TULOKSET */}
      <div className="card">
        <div className="lab">Ottelutulokset</div>
        <h2 style={{fontSize:18,margin:"4px 0 8px"}}>Maalit & tuplaottelu</h2>
        {Object.keys(GROUPS).map(g=>(
          <div key={g}>
            <div className="section-h" onClick={()=>setOpen(o=>({...o,["m"+g]:!o["m"+g]}))}><span>Lohko {g} — {GROUPS[g].join(", ")}</span><span>{open["m"+g]?"–":"+"}</span></div>
            {open["m"+g]&&mDraft.filter(m=>m.group===g).map(mt=>(
              <div key={mt.id} style={{padding:"8px 0",borderBottom:"1px dashed var(--line)"}}>
                <div className="row wrapf" style={{gap:6}}>
                  <div className="tm r" style={{flex:1}}>{flag(mt.home)} {mt.home}</div>
                  <input className="sc" inputMode="numeric" value={mt.hg} onChange={e=>/^[0-9]?$/.test(e.target.value)&&upM(mt.id,{hg:e.target.value})}/>
                  <span>–</span>
                  <input className="sc" inputMode="numeric" value={mt.ag} onChange={e=>/^[0-9]?$/.test(e.target.value)&&upM(mt.id,{ag:e.target.value})}/>
                  <div className="tm" style={{flex:1}}>{flag(mt.away)} {mt.away}</div>
                  <label className="row tiny" style={{gap:4}}><input type="checkbox" checked={!!mt.dbl} onChange={e=>upM(mt.id,{dbl:e.target.checked})}/>×2</label>
                </div>
              </div>
            ))}
          </div>
        ))}
        <div style={{textAlign:"center",marginTop:12}}><button className="act" onClick={saveM}>Tallenna tulokset</button></div>
      </div>

      {/* PELAAJATILASTOT */}
      <div className="card">
        <div className="lab">Pelaajatilastot</div>
        <h2 style={{fontSize:18,margin:"4px 0 8px"}}>Vain valitut pelaajat</h2>
        {picked.length===0?<div className="note">Kukaan ei ole vielä valinnut pelaajia.</div>:<>
          <div className="statline head"><span>Pelaaja</span><span>0-peli</span><span>Maali</span><span>Syöttö</span><span>Pun.k.</span><span>Oma m.</span></div>
          {picked.map(pp=>{ const t=psDraft[pp.k]||{};
            return <div className="statline" key={pp.k}>
              <span style={{fontWeight:700}}><span className="flag">{flag(pp.country)}</span>{pp.name} <span className="tiny">({pp.pos.join(",")})</span></span>
              {["cs","goal","assist","red","og"].map(f=><input key={f} inputMode="numeric" value={t[f]||""} placeholder="0" onChange={e=>setStat(pp.k,f,e.target.value)}/>)}
            </div>; })}
          <div style={{textAlign:"center",marginTop:12}}><button className="act" onClick={savePs}>Tallenna pelaajatilastot</button></div>
        </>}
      </div>

      {/* JOUKKUEET: VOITOT / MESTARUUS */}
      <div className="card">
        <div className="lab">Mestarijoukkueet</div>
        <h2 style={{fontSize:18,margin:"4px 0 8px"}}>Voitot & mestaruus</h2>
        <div className="note">Ryhmävaiheen voitot lasketaan automaattisesti tallennetuista ottelutuloksista (5 p/voitto). Lisää alle vain mahdolliset pudotuspelivoitot ja merkitse lopulta mestari (10 p).</div>
        {champTeams.length===0?<div className="note">Kukaan ei ole vielä valinnut mestarijoukkuetta.</div>:<>
          {champTeams.map(t=>{ const ts=tsDraft[t]||{}; const aw=autoGroupWins(t,matches);
            return <div className="row between wrapf" key={t} style={{padding:"8px 0",borderBottom:"1px dashed var(--line)",gap:10}}>
              <span style={{fontWeight:700,flex:1}}><span className="flag">{flag(t)}</span>{t} <span className="tiny" style={{fontWeight:400}}>· ryhmävoitot autom. {aw}</span></span>
              <label className="row tiny" style={{gap:6}}>+ pudotuspelivoitot<input className="sc" inputMode="numeric" value={ts.wins||""} placeholder="0" onChange={e=>/^[0-9]{0,2}$/.test(e.target.value)&&setTeam(t,"wins",e.target.value)}/></label>
              <label className="row tiny" style={{gap:6}}><input type="checkbox" checked={!!ts.champ} onChange={e=>setTeam(t,"champ",e.target.checked)}/>Mestari</label>
            </div>; })}
        </>}
        <div style={{textAlign:"center",marginTop:12}}><button className="act" onClick={saveTs}>Tallenna joukkuetiedot</button></div>
      </div>

      {/* TIPPUMISET (kaikki 48) */}
      <div className="card">
        <div className="section-h" onClick={()=>setOpen(o=>({...o,elim:!o.elim}))}><span>Tippuneet maat</span><span>{open.elim?"–":"+"}</span></div>
        {open.elim&&<div>
          <p className="tiny">Merkitse maa tippuneeksi pudotuspelien edetessä → sen pelaajat ja mestari­valinnat näkyvät tulostaulukossa harmaana. Kerätyt pisteet säilyvät.</p>
          {Object.keys(GROUPS).map(g=>(
            <div key={g} style={{marginTop:8}}>
              <div className="tiny" style={{color:"var(--blue2)",fontWeight:800}}>Lohko {g}</div>
              <div className="row wrapf" style={{gap:8,marginTop:4}}>
                {GROUPS[g].map(t=>{ const out=tsDraft[t]&&tsDraft[t].out;
                  return <label key={t} className="row tiny" style={{gap:4,border:"1px solid var(--line)",borderRadius:8,padding:"5px 8px",opacity:out?.6:1}}>
                    <input type="checkbox" checked={!!out} onChange={e=>setTeam(t,"out",e.target.checked)}/><span className="flag">{flag(t)}</span>{t}</label>; })}
              </div>
            </div>
          ))}
          <div style={{textAlign:"center",marginTop:12}}><button className="act" onClick={saveTs}>Tallenna tippumiset</button></div>
        </div>}
      </div>

      {/* KORJAA OSALLISTUJAN VALINTOJA */}
      <div className="card">
        <div className="section-h" onClick={()=>setOpen(o=>({...o,edit:!o.edit}))}><span>Korjaa osallistujan valintoja</span><span>{open.edit?"–":"+"}</span></div>
        {open.edit&&<div>
          <div className="row wrapf" style={{gap:8}}>
            <select value={editId} onChange={e=>e.target.value?startEdit(e.target.value):setEditDraft(null)}>
              <option value="">— valitse osallistuja —</option>
              {Object.keys(preds).map(id=><option key={id} value={id}>{preds[id].name||id}</option>)}
            </select>
          </div>
          {editDraft&&<div style={{marginTop:12}}>
            <TeamPicker value={editDraft} onChange={setEditDraft} disabled={false} playerstats={playerstats} showPts={false}/>
            <div style={{textAlign:"center",marginTop:12}}><button className="act" onClick={saveEdit}>Tallenna korjaus</button></div>
            <p className="tiny">Huom: tämä korjaa pelaaja- ja mestarivalinnat. Otteluveikkaukset osallistuja korjaa itse (ennen lukitusta).</p>
          </div>}
        </div>}
      </div>

      {/* MAKSUT */}
      <div className="card">
        <div className="section-h" onClick={()=>setOpen(o=>({...o,maksut:!o.maksut}))}><span>Maksut</span><span>{open.maksut?"–":"+"}</span></div>
        {open.maksut&&<div>
          {Object.keys(preds).length===0?<div className="note">Ei veikkaajia vielä.</div>:<>
            <p className="tiny">Rastita kun osallistujan maksu on tullut. Merkki näkyy kaikille tulostaulukossa ja osallistujan omalla sivulla — kunnes veikkaukset lukitaan.</p>
            <div className="tiny" style={{margin:"6px 0 4px",color:"var(--grn)",fontWeight:800}}>Maksanut {Object.values(preds).filter(p=>p.maksettu).length}/{Object.keys(preds).length}</div>
            {Object.keys(preds).sort((a,b)=>(preds[a].name||a).localeCompare(preds[b].name||b,"fi")).map(id=>{ const paid=!!preds[id].maksettu;
              return <label key={id} className="row between" style={{padding:"8px 0",borderBottom:"1px dashed var(--line)",cursor:"pointer"}}>
                <span style={{fontWeight:700}}>{preds[id].name||id}</span>
                <span className="row" style={{gap:10}}><PayPill paid={paid}/><input type="checkbox" style={{width:18,height:18}} checked={paid} onChange={e=>setPaid(id,e.target.checked)}/></span>
              </label>; })}
          </>}
        </div>}
      </div>

      {/* NOLLAA PELAAJAN PIN */}
      <div className="card">
        <div className="section-h" onClick={()=>setOpen(o=>({...o,pin:!o.pin}))}><span>Nollaa pelaajan PIN</span><span>{open.pin?"–":"+"}</span></div>
        {open.pin&&<div>
          <div className="row wrapf" style={{gap:8}}>
            <select value={resetId} onChange={e=>setResetId(e.target.value)}>
              <option value="">— valitse osallistuja —</option>
              {Object.keys(preds).map(id=><option key={id} value={id}>{(preds[id].name||id)+(preds[id].pin?" 🔒":"")}</option>)}
            </select>
            <button className="ghost" disabled={!resetId} onClick={doResetPin}>Nollaa PIN</button>
          </div>
          <p className="tiny">🔒 = veikkaajalla on PIN asetettuna. Jos pelaaja unohtaa PIN-koodinsa, nollaa se tästä — sen jälkeen veikkauksen voi avata ilman PIN:iä (ja asettaa uuden).</p>
        </div>}
      </div>

      <div className="card">
        <div className="section-h" onClick={()=>setOpen(o=>({...o,del:!o.del}))}><span>Poista veikkaaja</span><span>{open.del?"–":"+"}</span></div>
        {open.del&&<div>
          <div className="row wrapf" style={{gap:8}}>
            <select value={delId} onChange={e=>setDelId(e.target.value)}>
              <option value="">— valitse osallistuja —</option>
              {Object.keys(preds).map(id=><option key={id} value={id}>{preds[id].name||id}</option>)}
            </select>
            <button className="ghost" style={{borderColor:"var(--red)",color:"var(--red)"}} disabled={!delId} onClick={doDelete}>Poista valittu</button>
          </div>
          <p className="tiny">Poistaa veikkaajan rivin pysyvästi (esim. testirivi tai kahteen kertaan tullut). Tätä ei voi perua.</p>
        </div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
